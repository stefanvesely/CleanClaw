# markdownlint-cli2 configuration
# https://github.com/DavidAnson/markdownlint-cli2
#
# All default rules are enabled unless listed below.

config:
  default: true

  # --- Permanently disabled (style preferences) ---
  MD004: false  # ul-style — mixed */- is fine
  MD013: false  # line-length — 80-char limit too strict for docs prose
  MD014: false  # commands-show-output — $ prefix in code blocks is intentional
  MD024: false  # no-duplicate-heading — duplicate names in different sections are fine
  MD033: false  # no-inline-html — HTML in markdown is common on GitHub
  MD060: false  # table-column-style — table pipe spacing is cosmetic

  # --- Permanently disabled (false positives) ---
  # Front matter uses a complex `title:` object (with page/nav sub-keys),
  # not a plain title string. The default regex falsely matches it as an h1.
  MD025:
    front_matter_title: ""

ignores:
  - "node_modules/**"
  # GitHub issue templates use bold text instead of headings by design
  - ".github/ISSUE_TEMPLATE/bug_report.md"
  - ".github/ISSUE_TEMPLATE/feature_request.md"
  - ".github/ISSUE_TEMPLATE/real_usage_report.md"
  # Project CLAUDE.md is not a user-authored documentation file
  - "CLAUDE.md"
  # Pre-existing changelog files written before markdownlint was enforced
  - "changelog/2026-04-11-e8-e9-foundation.md"
  - "changelog/2026-04-11-fix-api-key-in-project-config.md"
  - "changelog/2026-04-11-task-planning-fuzzy-match.md"
  - "changelog/2026-04-11-weekend1-foundation.md"
  - "changelog/2026-04-11-weekend2-pipeline.md"
  - "changelog/2026-04-11-weekend3-language-agents.md"
  - "changelog/2026-04-11-weekend4-hardening.md"
  - "changelog/2026-04-11-weekend5-multi-provider.md"
  - "changelog/2026-04-11-weekend6-cli.md"
  - "changelog/2026-04-11-weekend7-launch.md"
  - "changelog/2026-04-14-cleanclaw-nemoclaw-integration-phase0.md"
  # Full plan document written before markdownlint was enforced
  - "cleanclaw_full_plan.md"
  # Generated plan/log files are not governed by markdownlint
  - "plans/**/*.md"
